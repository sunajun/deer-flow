appId: com.deerflow.desktop
productName: DeerFlow
copyright: Copyright © 2026 DeerFlow

directories:
  output: dist
  buildResources: resources

files:
  - dist/**/*
  - electron/**/*
  - src/**/*
  - "!**/node_modules/**/*"

extraResources:
  - from: resources/python-backend
    to: python-backend
    filter:
      - "**/*"
  - from: resources/vm-images
    to: vm-images
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - universal
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  identity: "Developer ID Application: DeerFlow Team (XXXXXXXXXX)"
  notarize:
    teamId: "XXXXXXXXXX"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  certificateFile: "${WIN_CERT_FILE}"
  certificatePassword: "${WIN_CERT_PASSWORD}"
  signAndEditExecutable: true
  signingHashAlgorithms:
    - sha256
  rfc3161TimeStampServer: "http://timestamp.digicert.com"
  timeStampServer: "http://timestamp.digicert.com"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  differentialPackage: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.png
  category: Development
  maintainer: "DeerFlow Team"
  vendor: "DeerFlow"
  synopsis: "DeerFlow Desktop - AI Agent with VM Sandbox"
  description: "DeerFlow is an AI agent platform with lightweight VM sandbox for secure code execution."
  desktop:
    Name: DeerFlow
    Comment: AI Agent with VM Sandbox
    Categories: Development;IDE;
    StartupNotify: true
    MimeType: x-scheme-handler/deerflow;
    StartupWMClass: deerflow-desktop

publish:
  provider: github
  owner: deerflow
  repo: deerflow
